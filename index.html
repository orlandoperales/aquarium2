<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Reef</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;overflow:hidden}
canvas{position:fixed;top:0;left:0;width:100%;height:100%}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const cv=document.getElementById('c');
const cx=cv.getContext('2d');
let W=window.innerWidth,H=window.innerHeight;
function resize(){cv.width=W=window.innerWidth;cv.height=H=window.innerHeight;initScene();}
window.addEventListener('resize',resize);
cv.width=W;cv.height=H;

const FISH=[
  {body:['#0066cc','#0044aa','#003388'],fin:'#ffaa00',accent:'#ffffff',stripe:'#ffcc00',sz:1.2},
  {body:['#e85d00','#cc4400','#ff7722'],fin:'#ffffff',accent:'#ff6600',stripe:'#ffffff',sz:0.9},
  {body:['#ddaa00','#cc9900','#ffcc00'],fin:'#bb8800',accent:'#ffee44',stripe:'#eeaa00',sz:0.85},
  {body:['#111111','#222222','#0d0d0d'],fin:'#ffcc00',accent:'#ffffff',stripe:'#ffdd00',sz:1.0},
  {body:['#00aa44','#008833','#00cc55'],fin:'#004422',accent:'#00ff66',stripe:'#006633',sz:0.6},
  {body:['#00aaff','#0088ee','#0055cc'],fin:'#003388',accent:'#44ccff',stripe:'#0066bb',sz:0.55},
  {body:['#008888','#006666','#00aaaa'],fin:'#004444',accent:'#00cccc',stripe:'#005555',sz:0.75},
  {body:['#ff5500','#dd4400','#ff7700'],fin:'#cc3300',accent:'#ff8833',stripe:'#ee4400',sz:0.65},
];

class Fish{
  constructor(){this.init(true);}
  init(rnd=false){
    this.t=FISH[Math.floor(Math.random()*FISH.length)];
    this.sz=(32+Math.random()*52)*this.t.sz;
    this.dir=Math.random()<0.5?1:-1;
    this.x=rnd?Math.random()*W:(this.dir>0?-160:W+160);
    this.y=H*0.07+Math.random()*H*0.72;
    this.spd=(0.3+Math.random()*1.0)*(0.55+this.sz/95);
    this.vy=0;this.ay=(Math.random()-0.5)*0.007;
    this.wb=Math.random()*Math.PI*2;this.wbs=0.022+Math.random()*0.03;
    this.tp=Math.random()*Math.PI*2;this.tps=0.065+Math.random()*0.055;
    this.op=rnd?Math.random():0;this.dp=0.3+Math.random()*0.7;
  }
  update(){
    this.x+=this.spd*this.dir;this.wb+=this.wbs;
    this.vy+=this.ay+Math.sin(this.wb)*0.01;this.vy*=0.975;this.y+=this.vy;
    this.tp+=this.tps;if(this.op<1)this.op=Math.min(1,this.op+0.003);
    if(this.y<H*0.04)this.vy+=0.25;if(this.y>H*0.85)this.vy-=0.25;
    if(this.dir>0&&this.x>W+180)this.init();if(this.dir<0&&this.x<-180)this.init();
  }
  draw(){
    cx.save();cx.translate(this.x,this.y);cx.scale(this.dir,1);
    cx.globalAlpha=this.op*this.dp;
    const s=this.sz,tail=Math.sin(this.tp)*0.4;
    const [c0,c1,c2]=this.t.body;
    cx.save();cx.globalAlpha=this.op*this.dp*0.08;cx.fillStyle='#000';
    cx.beginPath();cx.ellipse(0,s*0.65,s*0.55,s*0.09,0,0,Math.PI*2);cx.fill();cx.restore();
    cx.save();cx.translate(-s*0.5,0);cx.rotate(tail*1.4);cx.globalAlpha=this.op*this.dp*0.88;
    cx.fillStyle=c2;cx.beginPath();cx.moveTo(0,0);cx.lineTo(-s*0.5,-s*0.3);cx.lineTo(-s*0.15,0);cx.lineTo(-s*0.5,s*0.3);cx.closePath();cx.fill();cx.restore();
    cx.beginPath();cx.ellipse(0,0,s*0.56,s*0.28,0,0,Math.PI*2);cx.fillStyle=c1;cx.globalAlpha=this.op*this.dp;cx.fill();
    cx.beginPath();cx.ellipse(s*0.07,-s*0.03,s*0.46,s*0.21,0,0,Math.PI*2);cx.fillStyle=c0;cx.fill();
    cx.save();cx.beginPath();cx.ellipse(0,0,s*0.56,s*0.28,0,0,Math.PI*2);cx.clip();
    cx.strokeStyle=this.t.stripe;cx.lineWidth=s*0.08;cx.globalAlpha=this.op*this.dp*0.5;
    for(let i=-1;i<=1;i+=2){cx.beginPath();cx.moveTo(i*s*0.2,-s*0.3);cx.lineTo(i*s*0.2,s*0.3);cx.stroke();}cx.restore();
    cx.beginPath();cx.ellipse(s*0.05,s*0.08,s*0.33,s*0.11,0,0,Math.PI*2);cx.fillStyle='rgba(255,255,255,0.12)';cx.globalAlpha=this.op*this.dp;cx.fill();
    cx.beginPath();cx.ellipse(s*0.12,-s*0.11,s*0.2,s*0.06,-0.25,0,Math.PI*2);cx.fillStyle='rgba(255,255,255,0.1)';cx.fill();
    cx.globalAlpha=this.op*this.dp*0.8;cx.fillStyle=this.t.fin;
    cx.beginPath();cx.moveTo(-s*0.03,-s*0.27);cx.quadraticCurveTo(s*0.2,-s*0.5,s*0.35,-s*0.27);cx.lineTo(s*0.1,-s*0.27);cx.fill();
    cx.save();cx.translate(s*0.15,s*0.08);cx.rotate(Math.sin(this.tp*0.6)*0.35+0.3);
    cx.globalAlpha=this.op*this.dp*0.6;cx.fillStyle=c1;cx.beginPath();cx.ellipse(0,0,s*0.19,s*0.08,0.3,0,Math.PI*2);cx.fill();cx.restore();
    cx.globalAlpha=this.op*this.dp;
    cx.beginPath();cx.arc(s*0.36,-s*0.05,s*0.085,0,Math.PI*2);cx.fillStyle='#050505';cx.fill();
    cx.beginPath();cx.arc(s*0.39,-s*0.075,s*0.025,0,Math.PI*2);cx.fillStyle='rgba(255,255,255,0.85)';cx.fill();
    cx.beginPath();cx.arc(s*0.36,-s*0.05,s*0.085,0,Math.PI*2);cx.strokeStyle=this.t.accent;cx.lineWidth=s*0.018;cx.stroke();
    cx.restore();
  }
}

class BrainCoral{
  constructor(x,y,r,col){this.x=x;this.y=y;this.r=r;this.col=col;this.pts=[];
    for(let a=0;a<Math.PI*2;a+=0.18){const rr=r*(0.72+Math.random()*0.32);this.pts.push({x:Math.cos(a)*rr,y:Math.sin(a)*rr*0.7});}
  }
  draw(){
    cx.save();cx.translate(this.x,this.y);
    cx.beginPath();this.pts.forEach((p,i)=>{i===0?cx.moveTo(p.x,p.y):cx.lineTo(p.x,p.y);});cx.closePath();
    cx.fillStyle=this.col;cx.globalAlpha=0.85;cx.fill();
    cx.strokeStyle='rgba(0,0,0,0.4)';cx.lineWidth=1;
    for(let i=0;i<7;i++){const a=i/7*Math.PI*2;cx.beginPath();cx.moveTo(0,0);cx.lineTo(Math.cos(a)*this.r*0.85,Math.sin(a)*this.r*0.6);cx.stroke();}
    cx.beginPath();cx.ellipse(-this.r*0.18,-this.r*0.22,this.r*0.3,this.r*0.15,-0.3,0,Math.PI*2);
    cx.fillStyle='rgba(255,255,255,0.07)';cx.fill();
    cx.restore();
  }
}

class StaghornCoral{
  constructor(x,y,sz,col){this.x=x;this.y=y;this.sz=sz;this.col=col;}
  branch(x,y,len,angle,depth){
    if(depth>5||len<2.5)return;
    const ex=x+Math.cos(angle)*len,ey=y-Math.abs(Math.sin(angle))*len;
    cx.beginPath();cx.moveTo(x,y);cx.lineTo(ex,ey);
    cx.strokeStyle=this.col;cx.lineWidth=Math.max(0.7,len*0.1);cx.globalAlpha=0.8;cx.stroke();
    if(depth>=4){cx.beginPath();cx.arc(ex,ey,len*0.2,0,Math.PI*2);cx.fillStyle=this.col;cx.globalAlpha=0.9;cx.fill();}
    this.branch(ex,ey,len*0.66,angle-0.44,depth+1);this.branch(ex,ey,len*0.66,angle+0.44,depth+1);
  }
  draw(){
    const n=3+Math.floor(this.sz/20);
    for(let i=0;i<n;i++){const a=Math.PI/2+(i/(Math.max(n-1,1))-0.5)*0.9;this.branch(this.x,this.y,this.sz,a,0);}
  }
}

class Anemone{
  constructor(x,y){
    this.x=x;this.y=y;this.r=20+Math.random()*38;
    this.tent=8+Math.floor(Math.random()*8);this.ph=Math.random()*Math.PI*2;this.spd=0.01+Math.random()*0.009;
    const cols=[['#006644','#88ff44'],['#007755','#aaff66'],['#005533','#66ee33'],['#004488','#00ccff']];
    const c=cols[Math.floor(Math.random()*cols.length)];this.col=c[0];this.tip=c[1];
  }
  update(){this.ph+=this.spd;}
  draw(){
    for(let i=0;i<this.tent;i++){
      const ba=i/this.tent*Math.PI*2,wave=Math.sin(this.ph+i*0.85)*0.38;
      const bx=Math.cos(ba)*this.r*0.28,by=Math.sin(ba)*this.r*0.28;
      const tx=Math.cos(ba+wave)*this.r,ty=Math.sin(ba+wave)*this.r-this.r*0.28;
      cx.save();cx.translate(this.x,this.y);
      cx.beginPath();cx.moveTo(bx,by);cx.quadraticCurveTo(bx*1.4+tx*0.35,by*1.4+ty*0.35,tx,ty);
      cx.strokeStyle=this.col;cx.lineWidth=2.8;cx.globalAlpha=0.72;cx.stroke();
      cx.beginPath();cx.arc(tx,ty,3.2,0,Math.PI*2);cx.fillStyle=this.tip;cx.globalAlpha=0.88;cx.fill();
      cx.restore();
    }
    cx.beginPath();cx.ellipse(this.x,this.y,this.r*0.32,this.r*0.11,0,0,Math.PI*2);
    cx.fillStyle=this.col;cx.globalAlpha=0.6;cx.fill();
  }
}

class Rock{
  constructor(x,y,r){
    this.x=x;this.y=y;this.r=r;this.pts=[];
    const n=8+Math.floor(Math.random()*5);
    for(let i=0;i<n;i++){const a=i/n*Math.PI*2+(Math.random()-0.5)*0.3;this.pts.push({x:Math.cos(a)*r*(0.6+Math.random()*0.44),y:Math.sin(a)*r*(0.48+Math.random()*0.44)});}
    const d=Math.floor(Math.random()*3);this.col=[['#141428','#1c1c38'],['#0d1b2a','#1a2e42'],['#141414','#242424']][d];
  }
  draw(){
    cx.save();cx.translate(this.x,this.y);
    cx.beginPath();this.pts.forEach((p,i)=>{i===0?cx.moveTo(p.x,p.y):cx.lineTo(p.x,p.y);});cx.closePath();
    const g=cx.createLinearGradient(0,-this.r,0,this.r*0.5);g.addColorStop(0,this.col[0]);g.addColorStop(1,this.col[1]);
    cx.fillStyle=g;cx.globalAlpha=0.93;cx.fill();
    cx.strokeStyle='rgba(0,100,180,0.1)';cx.lineWidth=0.8;cx.stroke();
    cx.beginPath();cx.ellipse(-this.r*0.15,-this.r*0.28,this.r*0.28,this.r*0.1,-0.3,0,Math.PI*2);
    cx.fillStyle='rgba(255,255,255,0.04)';cx.fill();
    cx.restore();
  }
}

class Bubble{
  constructor(init=false){this.x=Math.random()*W;this.y=init?Math.random()*H:H+15;this.r=1.2+Math.random()*7;this.spd=0.2+Math.random()*0.7;this.wb=Math.random()*Math.PI*2;this.op=0.1+Math.random()*0.28;}
  update(){this.y-=this.spd;this.wb+=0.022;this.x+=Math.sin(this.wb)*0.45;if(this.y<-15){this.y=H+10;this.x=Math.random()*W;}}
  draw(){
    cx.save();cx.globalAlpha=this.op;cx.strokeStyle='rgba(100,195,255,0.85)';cx.lineWidth=0.65;
    cx.beginPath();cx.arc(this.x,this.y,this.r,0,Math.PI*2);cx.stroke();cx.fillStyle='rgba(140,220,255,0.05)';cx.fill();
    cx.beginPath();cx.arc(this.x-this.r*0.3,this.y-this.r*0.28,this.r*0.2,0,Math.PI*2);cx.fillStyle='rgba(255,255,255,0.42)';cx.fill();
    cx.restore();
  }
}

class Caustic{
  constructor(){this.x=Math.random()*W;this.y=Math.random()*H*0.55;this.rx=40+Math.random()*110;this.ry=8+Math.random()*22;this.ph=Math.random()*Math.PI*2;this.spd=0.008+Math.random()*0.011;this.op=0.02+Math.random()*0.05;this.rot=Math.random()*Math.PI;}
  update(){this.ph+=this.spd;this.rot+=0.001;}
  draw(){const s=Math.sin(this.ph)*0.38+0.62;cx.save();cx.globalAlpha=this.op*s;cx.fillStyle='rgba(0,160,255,1)';cx.beginPath();cx.ellipse(this.x,this.y,this.rx*s,this.ry*s,this.rot,0,Math.PI*2);cx.fill();cx.restore();}
}

let fishes,bubbles,rocks,brains,staghornCs,anemones,caustics;

function initScene(){
  fishes=Array.from({length:28},()=>new Fish());
  bubbles=Array.from({length:55},()=>new Bubble(true));
  caustics=Array.from({length:25},()=>new Caustic());
  rocks=[];
  for(let i=0;i<18;i++)rocks.push(new Rock(Math.random()*W,H*0.78+Math.random()*H*0.2,30+Math.random()*90));
  for(let i=0;i<14;i++)rocks.push(new Rock(Math.random()*W,H*0.82+Math.random()*H*0.15,15+Math.random()*45));
  brains=[];
  const bc=['#cc6600','#dd8800','#008855','#006644','#aa4400','#0066aa','#007744','#cc8800','#005588'];
  for(let i=0;i<24;i++)brains.push(new BrainCoral(Math.random()*W,H*0.72+Math.random()*H*0.22,12+Math.random()*45,bc[Math.floor(Math.random()*bc.length)]));
  staghornCs=[];
  const sc=['#ffaa00','#ff8800','#00cc88','#00aa66','#00aacc','#0088bb','#ccaa00','#ffcc00','#00ddaa'];
  for(let i=0;i<22;i++)staghornCs.push(new StaghornCoral(Math.random()*W,H*0.82+Math.random()*H*0.15,16+Math.random()*48,sc[Math.floor(Math.random()*sc.length)]));
  anemones=[];
  for(let i=0;i<14;i++)anemones.push(new Anemone(Math.random()*W,H*0.82+Math.random()*H*0.12));
}
initScene();

let t=0;
function drawBG(){
  const g=cx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#000508');g.addColorStop(0.15,'#000d18');g.addColorStop(0.45,'#001425');g.addColorStop(0.75,'#001830');g.addColorStop(1,'#000a14');
  cx.fillStyle=g;cx.fillRect(0,0,W,H);
}
function drawRays(){
  cx.save();
  for(let i=0;i<8;i++){
    const lx=W*(0.04+i*(0.92/7));const pulse=Math.sin(t*0.0006+i*1.3)*0.5+0.5;
    const rg=cx.createLinearGradient(lx,0,lx,H*0.75);
    rg.addColorStop(0,`rgba(0,140,255,${0.045*pulse})`);rg.addColorStop(0.4,`rgba(0,100,200,${0.022*pulse})`);rg.addColorStop(1,'rgba(0,60,120,0)');
    cx.fillStyle=rg;const bw=55+i*8;
    cx.beginPath();cx.moveTo(lx-bw*0.2,0);cx.lineTo(lx+bw*0.2,0);cx.lineTo(lx+bw,H*0.8);cx.lineTo(lx-bw,H*0.8);cx.closePath();cx.fill();
  }
  cx.restore();
}
function drawSurface(){
  cx.save();
  for(let x=0;x<=W;x+=3){
    const wy=Math.sin(x*0.016+t*0.0006)*10+Math.sin(x*0.042+t*0.001)*4;
    cx.globalAlpha=0.045+Math.sin(x*0.025)*0.015;cx.fillStyle='rgba(0,160,255,1)';cx.fillRect(x,wy,2,5);
  }
  cx.restore();
}
function drawSand(){
  const sg=cx.createLinearGradient(0,H*0.88,0,H);
  sg.addColorStop(0,'#e8e0d0');sg.addColorStop(0.3,'#d4ccb8');sg.addColorStop(0.7,'#b8b0a0');sg.addColorStop(1,'#988e7e');
  cx.fillStyle=sg;cx.beginPath();cx.moveTo(0,H*0.9);
  for(let x=0;x<=W;x+=30)cx.lineTo(x,H*0.9+Math.sin(x*0.04+0.8)*5);
  cx.lineTo(W,H);cx.lineTo(0,H);cx.closePath();cx.fill();
}
function drawParticles(){
  cx.save();
  for(let i=0;i<40;i++){
    const px=((Math.sin(i*137.5+t*0.00016)*0.5+0.5)*W),py=((Math.cos(i*97.3+t*0.00022)*0.5+0.5)*H*0.82);
    cx.globalAlpha=0.15+Math.sin(i*0.7+t*0.0008)*0.1;cx.fillStyle='rgba(0,180,255,1)';
    cx.beginPath();cx.arc(px,py,0.85,0,Math.PI*2);cx.fill();
  }
  cx.restore();
}

function loop(){
  requestAnimationFrame(loop);t++;
  drawBG();drawRays();
  caustics.forEach(c=>{c.update();c.draw();});
  drawSurface();
  rocks.slice(0,18).forEach(r=>r.draw());
  brains.forEach(b=>b.draw());
  staghornCs.forEach(s=>s.draw());
  rocks.slice(18).forEach(r=>r.draw());
  anemones.forEach(a=>{a.update();a.draw();});
  drawSand();
  bubbles.forEach(b=>{b.update();b.draw();});
  drawParticles();
  fishes.sort((a,b)=>a.dp-b.dp);
  fishes.forEach(f=>{f.update();f.draw();});
}
loop();
</script>
</body>
</html>
